<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Cloud Linux GUI - Desktop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #1a1a2e;
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }

        #loading {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0f0f1a 0%, #1a1a2e 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.5s ease;
        }

        #loading.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .logo {
            font-size: 100px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .title {
            color: #fff;
            font-size: 2rem;
            margin-top: 20px;
            background: linear-gradient(90deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: #888;
            font-size: 1rem;
            margin-top: 10px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-top: 30px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #screen:focus {
            outline: none;
        }

        #url-bar {
            position: fixed;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 12px 25px;
            color: #00d4ff;
            font-size: 14px;
            z-index: 100;
            border: 1px solid rgba(0, 212, 255, 0.3);
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .dot {
            width: 8px;
            height: 8px;
            background: #00ff00;
            border-radius: 50%;
            animation: pulse-dot 1s infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        #controls {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 15px;
            z-index: 100;
        }

        .btn {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.2), rgba(123, 44, 191, 0.2));
            backdrop-filter: blur(10px);
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .btn:hover {
            transform: scale(1.15);
            background: linear-gradient(135deg, rgba(0, 212, 255, 0.4), rgba(123, 44, 191, 0.4));
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn.connected {
            border-color: #00ff00;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.3);
        }

        #mobile-keys {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 10px;
            display: none;
            gap: 8px;
            z-index: 100;
            flex-wrap: wrap;
            max-width: 95%;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }

        .key {
            padding: 8px 14px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            border-radius: 8px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .key:hover {
            background: rgba(0, 212, 255, 0.2);
            border-color: #00d4ff;
        }

        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 255, 0, 0.9);
            color: #000;
            padding: 12px 24px;
            border-radius: 25px;
            font-size: 14px;
            z-index: 200;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .toast.show {
            opacity: 1;
        }

        @media (max-width: 768px) {
            #mobile-keys { display: flex; }
            #controls { bottom: 160px; }
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="logo">🖥️</div>
        <div class="title">Cloud Linux GUI</div>
        <div class="subtitle">Establishing secure connection...</div>
        <div class="spinner"></div>
    </div>

    <div id="screen" tabindex="0"></div>

    <div id="url-bar">
        <span class="dot"></span>
        <span id="current-url">Connecting...</span>
        <button class="btn" onclick="copyUrl()" style="width:35px;height:35px;font-size:14px;">📋</button>
    </div>

    <div id="controls">
        <button class="btn" onclick="toggleFullscreen()" title="Fullscreen">⛶</button>
        <button class="btn" onclick="sendCtrlAltDel()" title="Ctrl+Alt+Del">⌨️</button>
        <button class="btn" onclick="toggleKeyboard()" title="Toggle Keyboard">⌨️</button>
        <button class="btn" onclick="refresh()" title="Refresh">🔄</button>
    </div>

    <div id="mobile-keys">
        <button class="key" onclick="sendKey('Escape')">ESC</button>
        <button class="key" onclick="sendKey('Tab')">TAB</button>
        <button class="key" onclick="sendKey('Control_L')">CTRL</button>
        <button class="key" onclick="sendKey('Alt_L')">ALT</button>
        <button class="key" onclick="sendKey('Shift_L')">SHIFT</button>
        <button class="key" onclick="sendKey('Enter')">ENTER</button>
        <button class="key" onclick="sendKey('BackSpace')">⌫</button>
        <button class="key" onclick="sendKey('ArrowUp')">↑</button>
        <button class="key" onclick="sendKey('ArrowDown')">↓</button>
        <button class="key" onclick="sendKey('ArrowLeft')">←</button>
        <button class="key" onclick="sendKey('ArrowRight')">→</button>
    </div>

    <div id="toast" class="toast">Copied!</div>

    <!-- VNC Client Library -->
    <script src="https://cdn.jsdelivr.net/npm/@novnc/novnc@1.4.0/core/rfb.js"></script>

    <script>
        let rfb;
        let connected = false;

        // Get current tunnel URL
        function getCurrentURL() {
            const url = window.location.href;
            document.getElementById('current-url').textContent = url;
            return url;
        }

        // Get password from secure source - never hardcode in frontend
        // Password should be fetched from server-side endpoint or passed via secure channel
        async function getVncPassword() {
            // Try to fetch password from local secure endpoint
            try {
                const response = await fetch('/vnc-password');
                if (response.ok) {
                    const data = await response.json();
                    return data.password;
                }
            } catch (e) {
                console.warn('Could not fetch VNC password securely');
            }
            // Fallback: check if password was passed via secure URL parameter (one-time use)
            const urlParams = new URLSearchParams(window.location.search);
            const tempPass = urlParams.get('p');
            if (tempPass && tempPass.length >= 8) {
                return tempPass;
            }
            // Last resort: prompt user securely
            return prompt('Enter VNC password:') || '';
        }

        // Connection state for exponential backoff
        let reconnectAttempts = 0;
        const MAX_RECONNECT_ATTEMPTS = 10;
        const BASE_DELAY_MS = 1000;
        const MAX_DELAY_MS = 60000;

        function getReconnectDelay() {
            // Exponential backoff: 1s, 2s, 4s, 8s, ... up to 60s max
            const delay = Math.min(BASE_DELAY_MS * Math.pow(2, reconnectAttempts), MAX_DELAY_MS);
            // Add jitter (±10%) to prevent thundering herd
            const jitter = delay * 0.1 * (Math.random() * 2 - 1);
            return Math.round(delay + jitter);
        }

        async function connect() {
            const screen = document.getElementById('screen');
            const host = window.location.hostname;
            const port = window.location.port || (window.location.protocol === 'https:' ? 443 : 80);

            try {
                const proto = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
                const wsUrl = `${proto}//${host}:${port}/websockify`;

                // Fetch password securely
                const vncPassword = await getVncPassword();

                rfb = new RFB(screen, wsUrl, {
                    credentials: { password: vncPassword },
                    reconnect: false  // We handle reconnection ourselves with backoff
                });

                rfb.addEventListener('connect', () => {
                    connected = true;
                    document.getElementById('loading').classList.add('hidden');
                    document.querySelectorAll('#controls .btn')[3].classList.add('connected');
                });

                rfb.addEventListener('disconnect', () => {
                    connected = false;
                    document.getElementById('loading').classList.remove('hidden');
                    document.querySelectorAll('#controls .btn')[3].classList.remove('connected');

                    // Handle reconnection with exponential backoff (issue #42)
                    if (reconnectAttempts < MAX_RECONNECT_ATTEMPTS) {
                        const delay = getReconnectDelay();
                        reconnectAttempts++;
                        console.log(`Reconnecting in ${delay}ms (attempt ${reconnectAttempts}/${MAX_RECONNECT_ATTEMPTS})`);
                        setTimeout(connect, delay);
                    } else {
                        console.error('Max reconnection attempts reached');
                        document.querySelector('.subtitle').textContent = 'Connection lost. Please refresh the page.';
                    }
                });

                rfb.addEventListener('clipboard', (e) => {
                    navigator.clipboard.writeText(e.detail.text).then(() => {
                        showToast('Copied to clipboard!');
                    }).catch(() => {});
                });

            } catch (e) {
                console.error('Connection error:', e);
                document.querySelector('.subtitle').textContent = 'Connection failed. Retrying...';
                setTimeout(connect, 3000);
            }
        }

        // Control functions
        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        function sendCtrlAltDel() {
            if (rfb && connected) {
                rfb.sendCtrlAltDel();
                showToast('Ctrl+Alt+Del sent');
            }
        }

        function toggleKeyboard() {
            const kb = document.getElementById('mobile-keys');
            kb.style.display = kb.style.display === 'none' ? 'flex' : 'none';
        }

        function showKeyboard() {
            const kb = document.getElementById('mobile-keys');
            kb.style.display = 'flex';
        }

        function sendKey(key) {
            if (rfb && connected) {
                rfb.sendKey(key);
            }
        }

        function refresh() {
            reconnectAttempts = 0;  // Reset on manual refresh
            if (rfb) {
                rfb.disconnect();
                setTimeout(connect, 1000);
            }
        }

        function copyUrl() {
            navigator.clipboard.writeText(window.location.href).then(() => {
                showToast('URL copied!');
            }).catch(() => {});
        }

        function showToast(message) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // Handle paste from browser
        document.addEventListener('paste', (e) => {
            const text = e.clipboardData.getData('text');
            if (rfb && connected && text) {
                rfb.clipboardPaste(text);
            }
        });

        // Initialize on load
        window.addEventListener('load', () => {
            getCurrentURL();
            connect();
        });

        // Handle resize
        window.addEventListener('resize', () => {
            if (rfb && connected) rfb.resize();
        });

        // Handle keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (e.key === 'F11') {
                toggleFullscreen();
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
